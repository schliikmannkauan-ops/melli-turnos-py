<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#F5C500" />
    <title>Sin conexión — Barbería Melli</title>
    <style>
      html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #F5C500; color: #111; }
      .wrap { min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 24px; text-align: center; }
      h1 { font-size: 28px; margin: 0 0 12px; }
      p { margin: 0 0 24px; opacity: 0.8; }
      button { background: #111; color: #F5C500; border: 0; padding: 12px 24px; border-radius: 8px; font-weight: 600; font-size: 16px; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div>
        <h1>Sin conexión</h1>
        <p>No pudimos cargar la página. Revisá tu conexión a internet.</p>
        <button onclick="location.reload()">Reintentar</button>
      </div>
    </div>
  </body>
</html>
